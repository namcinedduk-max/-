<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏭 생산 뷰어 - 남씨네떡집</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family: 'Malgun Gothic', Apple SD Gothic Neo, sans-serif; background:#f5f0eb; color:#2C1810; min-height:100vh; }

  .header {
    background:#3D2314; color:#FAF6EF;
    padding:14px 16px 12px;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 8px rgba(0,0,0,0.3);
  }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:17px; font-weight:800; letter-spacing:-0.3px; }
  .header .clock { font-size:13px; color:#c4a882; font-weight:600; }
  .header .date-row { margin-top:10px; display:flex; align-items:center; gap:8px; }
  .header input[type=date] {
    flex:1; padding:8px 12px; border:none; border-radius:10px;
    font-size:15px; font-weight:700; color:#3D2314; background:#FAF6EF;
  }
  .btn-today {
    padding:8px 14px; background:#c2410c; color:#fff; border:none;
    border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;
  }
  .btn-refresh {
    padding:8px 12px; background:rgba(255,255,255,0.15); color:#FAF6EF; border:none;
    border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap;
  }

  .container { padding:12px; }

  /* 합계 섹션 */
  .section-title {
    font-size:14px; font-weight:800; color:#3D2314;
    margin:0 0 8px 2px;
    display:flex; align-items:center; gap:6px;
  }
  .count-pill {
    background:#c2410c; color:#fff;
    border-radius:20px; padding:2px 10px; font-size:12px; font-weight:700;
  }

  .summary-grid {
    display:grid; grid-template-columns: repeat(2, 1fr); gap:8px;
    margin-bottom:16px;
  }
  .summary-card {
    background:#fff; border-radius:14px;
    padding:14px 14px 12px;
    border-left:5px solid #c2410c;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  .summary-card .s-name {
    font-size:13px; font-weight:700; color:#3D2314;
    margin-bottom:6px; line-height:1.3;
  }
  .summary-card .s-qty {
    font-size:24px; font-weight:900; color:#c2410c; line-height:1;
  }

  /* 주문 카드 */
  .order-cards { display:flex; flex-direction:column; gap:10px; }
  .order-card {
    background:#fff; border-radius:14px; overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  .order-card-header {
    background:#3D2314; color:#FAF6EF;
    padding:10px 14px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .order-card-header .no { font-size:12px; color:#c4a882; font-weight:700; }
  .order-card-header .time { font-size:13px; font-weight:800; }
  .order-card-header .method { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:700; }
  .method-delivery { background:#dcfce7; color:#166534; }
  .method-pickup { background:#e0e7ff; color:#3730a3; }

  .order-card-body { padding:12px 14px; }
  .card-row { display:flex; gap:8px; margin-bottom:8px; align-items:flex-start; }
  .card-row:last-child { margin-bottom:0; }
  .card-label { font-size:11px; color:#888; font-weight:700; min-width:36px; padding-top:1px; }
  .card-value { font-size:14px; font-weight:700; color:#2C1810; flex:1; line-height:1.4; }
  .card-value.tteok { color:#c2410c; font-size:15px; font-weight:800; }
  .card-value.memo { color:#c2410c; font-size:13px; }
  .card-value.addr { font-size:12px; color:#666; font-weight:500; }

  .pay-badge {
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:12px; font-weight:700;
  }
  .pay-done { background:#dcfce7; color:#166534; }
  .pay-wait { background:#ffedd5; color:#c2410c; }
  .pay-gray { background:#f3f4f6; color:#6b7280; }

  .empty { text-align:center; padding:50px 20px; color:#aaa; }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  .empty p { font-size:15px; }

  .loading { text-align:center; padding:40px; color:#888; font-size:15px; }

  .sort-row {
    display:flex; gap:6px; margin-top:8px; flex-wrap:wrap;
  }
  .sort-btn {
    padding:6px 12px; border:none; border-radius:20px;
    font-size:12px; font-weight:700; cursor:pointer;
    background:rgba(255,255,255,0.15); color:#FAF6EF;
  }
  .sort-btn.active {
    background:#c2410c; color:#fff;
  }

  @media print {
    .header input, .btn-today, .btn-refresh { display:none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🏭 생산 뷰어</h1>
    <span class="clock" id="clockDisplay"></span>
  </div>
  <div class="date-row">
    <input type="date" id="dateInput">
    <button class="btn-today" onclick="setToday()">오늘</button>
    <button class="btn-refresh" onclick="loadData()">🔄</button>
  </div>
  <div class="sort-row">
    <button class="sort-btn active" id="sort-time" onclick="setSort('time')">⏰ 시간순</button>
    <button class="sort-btn" id="sort-tteok" onclick="setSort('tteok')">🍡 떡종류순</button>
    <button class="sort-btn" id="sort-method" onclick="setSort('method')">🚚 배송방법순</button>
  </div>
</div>

<div class="container">
  <div class="section-title">
    🍡 떡 합계
    <span class="count-pill" id="summaryCount">0종</span>
  </div>
  <div class="summary-grid" id="summaryGrid">
    <div class="loading">불러오는 중...</div>
  </div>

  <div class="section-title">
    📋 주문 목록
    <span class="count-pill" id="orderCount">0건</span>
  </div>
  <div class="order-cards" id="orderCards">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxVlzh9rzQaA9G8DntgEUExgDWUKsvtYb9LM3Blbh0QBZRv_SZdtL657_SpJ56n1qnE/exec';
let allOrders = [];
let currentSort = 'time';

function setSort(type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + type).classList.add('active');
  render(document.getElementById('dateInput').value);
}

function gasGet(params) {
  return new Promise(function(resolve, reject) {
    const cb = 'cb' + Date.now() + Math.floor(Math.random()*9999);
    const url = GAS_URL + '?' + Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(v)).join('&') + '&callback=' + cb;
    const sc = document.createElement('script');
    const timer = setTimeout(function() { delete window[cb]; sc.remove(); reject(new Error('timeout')); }, 15000);
    window[cb] = function(data) { clearTimeout(timer); delete window[cb]; sc.remove(); resolve(data); };
    sc.onerror = function() { clearTimeout(timer); delete window[cb]; sc.remove(); reject(new Error('error')); };
    sc.src = url; document.head.appendChild(sc);
  });
}

function setToday() {
  const d = new Date();
  document.getElementById('dateInput').value =
    d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  loadData();
}

function normDate(str) {
  if (!str) return '';
  const m = str.match(/(\d{4})[.\-](\d{1,2})[.\-](\d{1,2})/);
  return m ? m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0') : str;
}

function loadData() {
  document.getElementById('summaryGrid').innerHTML = '<div class="loading">불러오는 중...</div>';
  document.getElementById('orderCards').innerHTML = '<div class="loading">불러오는 중...</div>';
  gasGet({ action: 'getOrders' }).then(data => {
    if (!data.success) { showError(); return; }
    allOrders = data.orders || [];
    render(document.getElementById('dateInput').value);
  }).catch(() => showError());
}

function parseTteokItems(o) {
  if (o.tteokItems && o.tteokItems.length > 0) return o.tteokItems;
  if (!o.tteokType) return [];
  return o.tteokType.split(/[,\n]+/).map(s => s.trim()).filter(Boolean).map(s => {
    const m = s.match(/^(.+?)\s+([\d.]+\s*(?:말|되|개|박스|kg|k|g)?.*)$/i);
    return m ? { name: m[1].trim(), qty: m[2].trim() } : { name: s, qty: '' };
  });
}

// 합계 계산용: 세트(괄호안 재료)를 각각 분해해서 반환
// 예) {name:'분홍(약식/호설/깨끼/완두)', qty:'68개'}
//   → [{name:'약식',qty:'68개'}, {name:'호설',qty:'68개'}, ...]
function expandTteokItemsForSummary(items) {
  const result = [];
  items.forEach(function(t) {
    const setMatch = t.name.match(/^(.+?)\(([^)]+)\)$/);
    if (setMatch) {
      const subNames = setMatch[2].split(/[\/·,]+/).map(function(n){ return n.trim(); }).filter(Boolean);
      subNames.forEach(function(sub) {
        result.push({ name: sub, qty: t.qty });
      });
    } else {
      result.push(t);
    }
  });
  return result;
}

function parseQty(qty) {
  if (!qty) return { val: 0, unit: '개' };
  const m = String(qty).match(/([\d.]+)\s*(말|되|개|박스|kg|k|g)?/i);
  return m ? { val: parseFloat(m[1]), unit: (m[2]||'개').toLowerCase() } : { val: 0, unit: '개' };
}

function render(date) {
  const filtered = allOrders.filter(o =>
    o.deliveryMethod !== '택배' && normDate(String(o.deliveryDate||'')) === date
  ).sort((a,b) => {
    if (currentSort === 'tteok') {
      return String(a.tteokType||'').localeCompare(String(b.tteokType||''), 'ko');
    } else if (currentSort === 'method') {
      const ma = a.deliveryMethod||''; const mb = b.deliveryMethod||'';
      if (ma !== mb) return ma.localeCompare(mb);
      return String(a.deliveryTime||'zzz').localeCompare(String(b.deliveryTime||'zzz'));
    }
    // 기본: 시간순
    return String(a.deliveryTime||'zzz').localeCompare(String(b.deliveryTime||'zzz'));
  });

  document.getElementById('orderCount').textContent = filtered.length + '건';

  // 합계
  const totals = {};
  filtered.forEach(function(o) {
    expandTteokItemsForSummary(parseTteokItems(o)).forEach(function(t) {
      if (!totals[t.name]) totals[t.name] = {};
      const { val, unit } = parseQty(t.qty);
      totals[t.name][unit] = (totals[t.name][unit] || 0) + val;
    });
  });
  const keys = Object.keys(totals);
  document.getElementById('summaryCount').textContent = keys.length + '종';

  if (keys.length === 0) {
    document.getElementById('summaryGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#aaa;">해당 날짜 주문 없음</div>';
  } else {
    document.getElementById('summaryGrid').innerHTML = keys.map(name => {
      const qtyStr = Object.entries(totals[name]).map(([u,v]) => `${v}${u}`).join(' + ');
      return `<div class="summary-card">
        <div class="s-name">${name}</div>
        <div class="s-qty">${qtyStr}</div>
      </div>`;
    }).join('');
  }

  // 주문 카드
  if (filtered.length === 0) {
    document.getElementById('orderCards').innerHTML =
      '<div class="empty"><div class="icon">📭</div><p>해당 날짜 주문 없음</p></div>';
    return;
  }

  document.getElementById('orderCards').innerHTML = filtered.map((o, i) => {
    const items = parseTteokItems(o);
    const tteokHtml = items.length > 0
      ? items.map(t => t.name + (t.qty ? ' <strong>'+t.qty+'</strong>' : '')).join('<br>')
      : String(o.tteokType||'-');
    const addr = [o.deliveryAddr1, o.deliveryAddr2].filter(Boolean).join(' ') || '';
    const isPickup = o.deliveryMethod === '픽업';
    const payClass = o.payStatus === '결제완료' ? 'pay-done' : o.payStatus === '입금대기' ? 'pay-wait' : 'pay-gray';
    const methodClass = isPickup ? 'method-pickup' : 'method-delivery';
    const methodLabel = isPickup ? '🏪 픽업' : '🚚 배송';

    return `<div class="order-card">
      <div class="order-card-header">
        <span class="no">#${i+1}</span>
        <span class="time">${o.deliveryTime || '시간미정'}</span>
        <span class="method ${methodClass}">${methodLabel}</span>
      </div>
      <div class="order-card-body">
        <div class="card-row">
          <span class="card-label">받는분</span>
          <span class="card-value">${o.receiverName||'-'}</span>
          <span class="pay-badge ${payClass}">${o.payStatus}</span>
        </div>
        <div class="card-row">
          <span class="card-label">떡종류</span>
          <span class="card-value tteok">${tteokHtml}</span>
        </div>
        ${addr && !isPickup ? `<div class="card-row">
          <span class="card-label">주소</span>
          <span class="card-value addr">${addr}</span>
        </div>` : ''}
        ${o.memo ? `<div class="card-row">
          <span class="card-label">메모</span>
          <span class="card-value memo">⚠️ ${o.memo}</span>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showError() {
  document.getElementById('summaryGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:20px;color:#c2410c;">❌ 연결 실패</div>';
  document.getElementById('orderCards').innerHTML = '<div class="empty"><div class="icon">❌</div><p>GAS 연결 실패</p></div>';
}

// 시계
setInterval(() => {
  document.getElementById('clockDisplay').textContent =
    new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
}, 1000);

// 30초 자동 새로고침
setInterval(() => loadData(), 30000);
document.getElementById('dateInput').addEventListener('change', () => loadData());

setToday();
</script>
</body>
</html>
